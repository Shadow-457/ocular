<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Photo (Rotated Left) -->
  <g transform="rotate(-12 50 50)">
    <rect x="15" y="15" width="70" height="70" rx="5" fill="#bdc3c7" />
    <rect x="20" y="20" width="60" height="60" rx="3" fill="#ff7675" />
  </g>

  <!-- Middle Photo (Rotated Right) -->
  <g transform="rotate(8 50 50)">
    <rect x="15" y="15" width="70" height="70" rx="5" fill="#f5f6fa" />
    <rect x="20" y="20" width="60" height="60" rx="3" fill="#74b9ff" />
  </g>

  <!-- Foreground Photo (Straight) -->
  <g>
    <rect x="15" y="15" width="70" height="70" rx="5" fill="#ffffff" stroke="#dcdde1" stroke-width="2"/>
    <clipPath id="photoClip">
      <rect x="20" y="20" width="60" height="60" rx="3" />
    </clipPath>
    <g clip-path="url(#photoClip)">
      <rect x="20" y="20" width="60" height="60" fill="#55efc4" />
      <polygon points="10,85 45,40 70,85" fill="#00b894" />
      <polygon points="50,85 65,55 90,85" fill="#00cec9" />
      <circle cx="65" cy="35" r="8" fill="#fdcb6e" />
    </g>
  </g>
</svg>
